name: Build and Deploy Blueprint + Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Mathlib cache
        run: lake exe cache get

      - name: Build Lean project
        run: lake build

      - name: Build doc-gen4 docs
        run: lake build KIP:docs

      - name: Install Python dependencies
        run: |
          pip install plasTeX plastexdepgraph plastexshowmore leanblueprint

      - name: Build blueprint
        run: |
          cd blueprint
          python3 prepare_web_sources.py
          cd src
          plastex -c plastex.cfg web.tex

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          # Blueprint at root
          cp -r blueprint/web/* _site/
          # Doc-gen4 under /docs/
          cp -r .lake/build/doc/* _site/docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
