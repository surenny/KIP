[general]
renderer=HTML5
copy-theme-extras=yes
plugins=plastexdepgraph plastexshowmore leanblueprint

[document]
toc-depth=3
toc-non-files=True

[files]
directory=../web/
split-level=1

[html5]
localtoc-level=0
extra-css=extra_styles.css annotations.css
extra-js=annotations.js
mathjax-dollars=False

[images]
imager=none
vector-imager=none

